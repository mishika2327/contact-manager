services:
  - type: web
    name: contact-manager
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      npm install && \
      cd ../frontend && npm install && npm run build && \
      mkdir -p ../backend/public && \
      cp -r build/* ../backend/public/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
