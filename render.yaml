services:
  - type: web
    name: contact-manager
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      npm ci --production && \
      cd ../frontend && npm ci && npm run build && \
      cp -r build ../backend/public
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
